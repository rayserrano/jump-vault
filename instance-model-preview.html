<!DOCTYPE html>

<style>

<body>
<div class="im-stage">
<svg viewBox="0 0 800 664" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Instance model. Jessica Alvarez and NC Courage are both parties. Each plays a role in PARTY_ROLE, referencing ROLE. PARTY_RELATIONSHIP, highlighted as the tenancy, joins the two party roles with type FAN_OF and is where which club owns the fan lives. A ticket transaction joins the same two party roles through FAN_TRANSACTION_ROLE. Arrows point parent to child; every join lands on a named party role and the club is never a text value.">
  <defs>
    <marker id="im-arrow" markerWidth="8" markerHeight="8" refX="6.5" refY="3" orient="auto"><path d="M0,0 L6.5,3 L0,6 Z" fill="#8a8a8a"/></marker>
  </defs>

  <!-- ELBOW CONNECTIONS (parent -> child) -->
  <path d="M120,164 V245 H286" fill="none" stroke="#8a8a8a" stroke-width="1.3" marker-end="url(#im-arrow)"/>
  <path d="M660,164 V245 H584" fill="none" stroke="#8a8a8a" stroke-width="1.3" marker-end="url(#im-arrow)"/>
  <path d="M400,314 V356" fill="none" stroke="#8a8a8a" stroke-width="1.3" marker-end="url(#im-arrow)"/>
  <path d="M580,270 H640 V516" fill="none" stroke="#8a8a8a" stroke-width="1.3" marker-end="url(#im-arrow)"/>
  <path d="M290,577 H466" fill="none" stroke="#8a8a8a" stroke-width="1.3" marker-end="url(#im-arrow)"/>

  <!-- ROLE -->
  <g>
    <rect x="40" y="60" width="160" height="104" rx="8" fill="#1f1f1f" stroke="#3a3a3a"/>
    <text x="54" y="86" font-family="'Courier New',monospace" font-size="13" font-weight="700" fill="#7f97ff">ROLE</text>
    <line x1="48" y1="94" x2="192" y2="94" stroke="#333"/>
    <text x="54" y="112" font-family="Inter,Arial" font-size="11" fill="#8a8a8a">role</text>
    <text x="54" y="132" font-family="'Courier New',monospace" font-size="12.5" fill="#f4f4f4">FAN</text>
    <text x="54" y="151" font-family="'Courier New',monospace" font-size="12.5" fill="#f4f4f4">CLUB</text>
  </g>

  <!-- PARTY + sources note -->
  <text x="574" y="50" font-family="Inter,Arial" font-size="11" font-style="italic" fill="#9a9a9a">resolved from 3 sources</text>
  <path d="M620,54 V59" fill="none" stroke="#6f6f6f" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#im-arrow)"/>
  <g>
    <rect x="560" y="60" width="200" height="104" rx="8" fill="#1f1f1f" stroke="#3a3a3a"/>
    <text x="574" y="86" font-family="'Courier New',monospace" font-size="13" font-weight="700" fill="#7f97ff">PARTY</text>
    <line x1="568" y1="94" x2="752" y2="94" stroke="#333"/>
    <text x="574" y="112" font-family="Inter,Arial" font-size="11" fill="#8a8a8a">party</text>
    <text x="574" y="132" font-family="'Courier New',monospace" font-size="12.5" fill="#f4f4f4">Jessica Alvarez</text>
    <text x="574" y="151" font-family="'Courier New',monospace" font-size="12.5" fill="#f4f4f4">NC Courage</text>
  </g>

  <!-- PARTY_ROLE -->
  <g>
    <rect x="290" y="210" width="294" height="104" rx="8" fill="#1f1f1f" stroke="#3a3a3a"/>
    <text x="304" y="236" font-family="'Courier New',monospace" font-size="13" font-weight="700" fill="#7f97ff">PARTY_ROLE</text>
    <line x1="298" y1="244" x2="576" y2="244" stroke="#333"/>
    <text x="304" y="262" font-family="Inter,Arial" font-size="11" fill="#8a8a8a">party_role</text>
    <text x="304" y="282" font-family="'Courier New',monospace" font-size="12.5" fill="#f4f4f4">Jessica Alvarez as FAN</text>
    <text x="304" y="301" font-family="'Courier New',monospace" font-size="12.5" fill="#f4f4f4">NC Courage as CLUB</text>
  </g>

  <!-- PARTY_RELATIONSHIP (tenancy, lime, center) -->
  <g>
    <rect x="253" y="356" width="294" height="126" rx="8" fill="#1f1f1f" stroke="#ccff00" stroke-width="1.7"/>
    <text x="267" y="382" font-family="'Courier New',monospace" font-size="13" font-weight="700" fill="#ccff00">PARTY_RELATIONSHIP</text>
    <text x="500" y="382" font-family="Inter,Arial" font-size="10" fill="#ccff00">tenancy</text>
    <line x1="261" y1="390" x2="539" y2="390" stroke="#444"/>
    <text x="267" y="410" font-family="Inter,Arial" font-size="11" fill="#8a8a8a">type: FAN_OF</text>
    <text x="267" y="434" font-family="'Courier New',monospace" font-size="12.5" fill="#f4f4f4">from: Jessica Alvarez as FAN</text>
    <text x="267" y="458" font-family="'Courier New',monospace" font-size="12.5" fill="#f4f4f4">to:&#160;&#160; NC Courage as CLUB</text>
  </g>

  <!-- FAN_TRANSACTION -->
  <g>
    <rect x="40" y="530" width="250" height="94" rx="8" fill="#1f1f1f" stroke="#3a3a3a"/>
    <text x="54" y="556" font-family="'Courier New',monospace" font-size="13" font-weight="700" fill="#7f97ff">FAN_TRANSACTION</text>
    <line x1="48" y1="564" x2="282" y2="564" stroke="#333"/>
    <text x="54" y="584" font-family="Inter,Arial" font-size="11" fill="#8a8a8a">txn &#183; type &#183; amount</text>
    <text x="54" y="606" font-family="'Courier New',monospace" font-size="12.5" fill="#f4f4f4">TKT-Mar14 &#183; TICKET &#183; $1,840</text>
  </g>

  <!-- FAN_TRANSACTION_ROLE -->
  <g>
    <rect x="470" y="516" width="294" height="126" rx="8" fill="#1f1f1f" stroke="#3a3a3a"/>
    <text x="484" y="542" font-family="'Courier New',monospace" font-size="13" font-weight="700" fill="#7f97ff">FAN_TRANSACTION_ROLE</text>
    <line x1="478" y1="550" x2="756" y2="550" stroke="#333"/>
    <text x="484" y="570" font-family="Inter,Arial" font-size="11" fill="#8a8a8a">txn joins party_roles</text>
    <text x="484" y="592" font-family="'Courier New',monospace" font-size="12" fill="#f4f4f4">TKT-Mar14 &#8594; Jessica Alvarez as FAN</text>
    <text x="484" y="614" font-family="'Courier New',monospace" font-size="12" fill="#f4f4f4">TKT-Mar14 &#8594; NC Courage as CLUB</text>
  </g>
</svg>
<p class="im-cap">PARTY_RELATIONSHIP (lime) is the tenancy: which club owns the fan. Arrows point parent to child; every join lands on a named party role, so the club is a party playing a role, never a text value.</p>
</div>
